name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # $env/static/* importlari build/check zamaninda inline edilir; .env.local gitignore'da
    # oldugu icin CI'da placeholder sart. Yeni $env/static import'u eklersen buraya da ekle.
    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
      PUBLIC_TURNSTILE_SITE_KEY: placeholder-turnstile-site-key
      SUPABASE_SECRET_KEY: sb_secret_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run check
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1 # lokal geliştirme sürümüyle eşit — bilinçli bump'la yükselt
      - run: supabase start
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
