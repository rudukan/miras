name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # $env/static/* importlari build/check zamaninda inline edilir; .env.local gitignore'da
    # oldugu icin CI'da placeholder sart. Yeni $env/static import'u eklersen buraya da ekle.
    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run check
      - run: npm run build
